name: Deploy Hapura HQ

on:
  push:
    branches: [main]

env:
  PROJECT_ID: hapura-hq
  REGION: asia-southeast1
  SERVICE: hapura-command-backend
  BACKEND_URL: https://hapura-command-backend-730131473012.asia-southeast1.run.app

jobs:
  # ── Backend → Cloud Run ──────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Write Firebase service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > backend/serviceAccountKey.json

      - name: Build env vars file
        env:
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_WEBHOOK_SECRET:  ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          WEBHOOK_SECRET:           ${{ secrets.WEBHOOK_SECRET }}
          SCHEDULER_SECRET:         ${{ secrets.SCHEDULER_SECRET }}
          GH_API_TOKEN:             ${{ secrets.GH_API_TOKEN }}
        run: |
          cat > /tmp/env.yaml << 'ENVEOF'
          APP_ENV: production
          GCP_PROJECT_ID: hapura-hq
          GCP_REGION: asia-southeast1
          CORS_ORIGINS: '["https://hapura-hq.web.app","https://hq.hapura.vn"]'
          OPENAI_BASE_URL: "https://vertex-key.com/api/v1"
          LLM_MODEL: "openai/aws/claude-sonnet-4-6"
          MODEL_HEALTH_CHECKER: "openai/aws/claude-haiku-4-5"
          MODEL_BUG_DETECTIVE: "openai/aws/claude-sonnet-4-6"
          MODEL_STRATEGIST: "openai/aws/claude-sonnet-4-6"
          MODEL_REVENUE_FORECASTER: "openai/aws/claude-opus-4-6"
          MODEL_ARIA: "openai/aws/claude-sonnet-4-6"
          MODEL_DIRECTOR: "openai/aws/claude-opus-4-6"
          MODEL_ASO_ANALYST: "openai/aws/claude-sonnet-4-6"
          MODEL_CONTENT_STRATEGIST: "openai/aws/claude-sonnet-4-6"
          MODEL_COMPETITOR_WATCHER: "openai/aws/claude-sonnet-4-6"
          OPENAI_API_KEY: "${OPENAI_API_KEY}"
          TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
          TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
          TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
          WEBHOOK_SECRET: "${WEBHOOK_SECRET}"
          SCHEDULER_SECRET: "${SCHEDULER_SECRET}"
          GITHUB_TOKEN: "${GH_API_TOKEN}"
          ENVEOF
          # Substitute env vars
          envsubst < /tmp/env.yaml > /tmp/env-final.yaml
          mv /tmp/env-final.yaml /tmp/env.yaml

      - name: Deploy to Cloud Run
        working-directory: backend
        run: |
          gcloud run deploy $SERVICE \
            --source . \
            --region $REGION \
            --project $PROJECT_ID \
            --allow-unauthenticated \
            --port 8099 \
            --memory 1Gi \
            --timeout 300 \
            --env-vars-file /tmp/env.yaml

      - name: Get service URL
        id: get-url
        run: |
          URL=$(gcloud run services describe $SERVICE \
            --region $REGION --project $PROJECT_ID \
            --format "value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend deployed: $URL"

  # ── Frontend → Firebase Hosting ─────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.url }}/api/v1
          VITE_FIREBASE_API_KEY:              ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:          ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:           ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:       ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:               ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HAPURA_HQ }}
          projectId: hapura-hq
          channelId: live
  # NOTE: setup-scheduler job removed 2026-06-02. The 14 war-room agent schedulers
  # it created were dead behind the maintenance-mode 503 wall (main.py) since 2026-04-03
  # and cost nothing while pinging a blocked endpoint. Restore from git history if the
  # agents are ever revived (remove the maintenance middleware first, or they 503 again).
  # Live schedulers (auto-social dispatch/reconcile, tracker) are managed outside this workflow.
