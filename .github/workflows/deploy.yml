name: Deploy Hapura HQ

on:
  push:
    branches: [main]

env:
  PROJECT_ID: hapura-hq
  REGION: asia-southeast1
  SERVICE: hapura-command-backend

jobs:
  # ── Backend → Cloud Run ──────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Write Firebase service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > backend/serviceAccountKey.json

      - name: Build env vars file
        env:
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_WEBHOOK_SECRET:  ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          WEBHOOK_SECRET:           ${{ secrets.WEBHOOK_SECRET }}
          GH_API_TOKEN:             ${{ secrets.GH_API_TOKEN }}
        run: |
          cat > /tmp/env.yaml << ENVEOF
          APP_ENV: production
          GCP_PROJECT_ID: hapura-hq
          GCP_REGION: asia-southeast1
          CORS_ORIGINS: '["https://hapura-hq.web.app","https://hq.hapura.vn"]'
          OPENAI_API_KEY: "${OPENAI_API_KEY}"
          TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
          TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
          TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
          WEBHOOK_SECRET: "${WEBHOOK_SECRET}"
          GITHUB_TOKEN: "${GH_API_TOKEN}"
          ENVEOF

      - name: Deploy to Cloud Run
        working-directory: backend
        run: |
          gcloud run deploy $SERVICE \
            --source . \
            --region $REGION \
            --project $PROJECT_ID \
            --allow-unauthenticated \
            --port 8099 \
            --memory 512Mi \
            --env-vars-file /tmp/env.yaml

      - name: Get service URL
        id: get-url
        run: |
          URL=$(gcloud run services describe $SERVICE \
            --region $REGION --project $PROJECT_ID \
            --format "value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend deployed: $URL"

  # ── Frontend → Firebase Hosting ─────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.url }}/api/v1
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HAPURA_HQ }}
          projectId: hapura-hq
          channelId: live
